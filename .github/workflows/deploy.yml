name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  cicd:
    uses: possession-community/modsharp-publish-action/.github/workflows/deploy.yml@v1
    with:
      projects: |
        TnmsPluginFoundation.Example
      shared-projects-phase1: TnmsPluginFoundation

      platforms: linux-x64 win-x64

      main-artifact-name: TnmsPluginFoundation-Core
      main-artifact-include: modules shared

      extended-artifact-name: TnmsPluginFoundation-WithDependencies
      extended-artifact-include: modules shared

      dependencies: |
        https://github.com/possession-community/TnmsAdministrationPlatform/releases/latest/download/TnmsAdministrationPlatform.zip
        https://github.com/possession-community/TnmsExtendableTargeting/releases/latest/download/TnmsExtendableTargeting.zip
        https://github.com/possession-community/TnmsLocalizationPlatform/releases/latest/download/TnmsLocalizationPlatform.zip

      shared-dlls-to-remove: |
        TnmsAdministrationPlatform.Shared.dll
        TnmsExtendableTargeting.Shared.dll
        TnmsLocalizationPlatform.Shared.dll
        TnmsCentralizedDbPlatform.Shared.dll

      nuget-project-dirs: TnmsPluginFoundation
      nuget-config-props: config.props
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  release:
    needs: cicd
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-*
          merge-multiple: true
          path: artifacts/
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/*.zip
